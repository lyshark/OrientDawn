    <script>
        //  友链数据定义 
        const linksData = {
            recommended: [

            normal: [
                {
                    name: '宇外御风',
                    url: 'https://www.20010501.xyz/',
                    description: '分享免费有趣的知识',
                    icon: 'fa-globe',
                    color: 'blue'
                },
                {
                    name: '鸦鸦的巢穴',
                    url: 'https://www.crowya.com/',
                    description: '在乌鸦统治的世界里，洁白的羽毛是有罪的。',
                    icon: 'fa-globe',
                    color: 'blue'
                },
                {
                    name: '小曹同学',
                    url: 'https://blog.caotx.cn/',
                    description: '小曹同学',
                    icon: 'fa-globe',
                    color: 'blue'
                },
                {
                    name: 'lololowe的博客',
                    url: 'https://blog.lololowe.com/',
                    description: '恬淡无为',
                    icon: 'fa-globe',
                    color: 'blue'
                }
            ],
            enterprise: [
                {
                    name: '云计算公司A',
                    url: '#',
                    description: '提供企业级云计算解决方案',
                    icon: 'fa-server',
                    color: 'orange'
                }
            ]
        };

        // 颜色映射
        const colorMap = {
            blue: { from: 'from-blue-500', to: 'to-blue-600', bg: 'bg-blue-500' },
            purple: { from: 'from-purple-500', to: 'to-purple-600', bg: 'bg-purple-500' },
            green: { from: 'from-green-500', to: 'to-green-600', bg: 'bg-green-500' },
            orange: { from: 'from-orange-500', to: 'to-orange-600', bg: 'bg-orange-500' },
            red: { from: 'from-red-500', to: 'to-red-600', bg: 'bg-red-500' },
            indigo: { from: 'from-indigo-500', to: 'to-indigo-600', bg: 'bg-indigo-500' },
            teal: { from: 'from-teal-500', to: 'to-teal-600', bg: 'bg-teal-500' },
            pink: { from: 'from-pink-500', to: 'to-pink-600', bg: 'bg-pink-500' }
        };

        //  渲染函数 
        function getColorClasses(color, isPartner = false) {
            const c = colorMap[color] || colorMap.blue;
            return isPartner 
                ? `bg-gradient-to-br ${c.from} ${c.to}`
                : `bg-gradient-to-br ${c.from} ${c.to}`;
        }

        function renderLinkCard(link, type) {
            const isPartner = type === 'partners';
            const colorClass = getColorClasses(link.color, isPartner);
            const borderColor = colorMap[link.color]?.bg || 'bg-blue-500';
            
            if (isPartner) {
                return `
                    <a href="${link.url}" target="_blank" class="group relative bg-white rounded-2xl p-6 card-hover overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-br ${link.color}/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r ${colorMap[link.color]?.from} ${colorMap[link.color]?.to} opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="${colorClass} w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-110 group-hover:rotate-3 transition-all duration-300 shadow-lg">
                            <i class="fa ${link.icon || 'fa-globe'} text-white text-2xl"></i>
                        </div>
                        <h3 class="font-bold text-lg text-gray-800 mb-1 relative">${link.name}</h3>
                        <p class="text-sm text-gray-500 relative">${link.description || '战略合作伙伴'}</p>
                    </a>
                `;
            } else {
                const isRecommended = type === 'recommended';
                const isEnterprise = type === 'enterprise';
                const tagHtml = isRecommended 
                    ? '<span class="px-2 py-0.5 bg-gradient-to-r from-orange-400 to-red-500 text-white text-xs rounded-full font-medium shadow-sm">推荐</span>'
                    : '';
                
                return `
                    <a href="${link.url}" target="_blank" class="group relative bg-white rounded-2xl p-6 card-hover overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-br ${link.color}/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b ${colorMap[link.color]?.from} ${colorMap[link.color]?.to} opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="absolute -top-4 -right-4 w-20 h-20 ${borderColor} rounded-full opacity-5 group-hover:opacity-10 group-hover:scale-150 transition-all duration-500"></div>
                        <div class="absolute -bottom-2 -left-2 w-16 h-16 ${borderColor} rounded-full opacity-5 group-hover:opacity-10 group-hover:scale-150 transition-all duration-500"></div>
                        
                        <div class="flex items-start space-x-4 relative">
                            <div class="${colorClass} w-14 h-14 rounded-xl flex items-center justify-center flex-shrink-0 shadow-lg group-hover:scale-110 group-hover:rotate-3 transition-all duration-300">
                                <i class="fa ${link.icon || 'fa-globe'} text-white text-xl"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center space-x-2 mb-2">
                                    <h3 class="font-bold text-gray-800 truncate group-hover:text-${link.color}-600 transition-colors">${link.name}</h3>
                                    ${tagHtml}
                                </div>
                                <p class="text-xs text-gray-400 mb-2 truncate flex items-center">
                                    <i class="fa fa-link mr-1 opacity-50"></i>${link.url}
                                </p>
                                <p class="text-sm text-gray-600 line-clamp-2 group-hover:text-gray-700 transition-colors">${link.description || ''}</p>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-t border-dashed border-gray-200 flex items-center justify-between relative">
                            <span class="text-xs text-gray-400 flex items-center gap-2 bg-gray-50 px-3 py-1 rounded-full group-hover:bg-${link.color}-50 group-hover:text-${link.color}-600 transition-colors">
                                <i class="fa fa-external-link-alt text-xs"></i>访问网站
                            </span>
                            <span class="w-7 h-7 rounded-full ${borderColor} bg-opacity-10 flex items-center justify-center group-hover:bg-opacity-20 group-hover:scale-110 transition-all">
                                <i class="fa fa-arrow-right text-xs ${borderColor.replace('bg-', 'text-')} group-hover:translate-x-1 transition-transform inline-block"></i>
                            </span>
                        </div>
                    </a>
                `;
            }
        }

        function renderAllLinks() {
            // 渲染特别推荐
            document.getElementById('section-recommended-grid').innerHTML = 
                linksData.recommended.map(link => renderLinkCard(link, 'recommended')).join('');
            
            // 渲染合作伙伴
            document.getElementById('section-partners-grid').innerHTML = 
                linksData.partners.map(link => renderLinkCard(link, 'partners')).join('');
            
            // 渲染普通友链
            document.getElementById('section-normal-grid').innerHTML = 
                linksData.normal.map(link => renderLinkCard(link, 'normal')).join('');
            
            // 渲染企业友链
            document.getElementById('section-enterprise-grid').innerHTML = 
                linksData.enterprise.map(link => renderLinkCard(link, 'enterprise')).join('');
            
            // 更新统计
            updateStats();
        }

        function updateStats() {
            document.getElementById('stat-recommended').textContent = linksData.recommended.length;
            document.getElementById('stat-partners').textContent = linksData.partners.length;
            document.getElementById('stat-normal').textContent = linksData.normal.length;
            document.getElementById('stat-enterprise').textContent = linksData.enterprise.length;
            document.getElementById('enterprise-count').textContent = linksData.enterprise.length;
        }



        // Toast 提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            
            toastMessage.textContent = message;
            
            if (type === 'error') {
                toast.innerHTML = `<i class="fa fa-exclamation-circle mr-2 text-red-400"></i><span>${message}</span>`;
            } else {
                toast.innerHTML = `<i class="fa fa-check-circle mr-2 text-green-400"></i><span>${message}</span>`;
            }
            
            toast.classList.remove('opacity-0', 'invisible');
            toast.classList.add('opacity-100', 'visible');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'invisible');
                toast.classList.remove('opacity-100', 'visible');
            }, 3000);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderAllLinks();
        });



        // 导航栏滚动效果
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('py-2', 'shadow-lg');
                navbar.classList.remove('py-3', 'shadow-md');
            } else {
                navbar.classList.add('py-3', 'shadow-md');
                navbar.classList.remove('py-2', 'shadow-lg');
            }
        });

        // 回到顶部按钮
        const backToTopBtn = document.getElementById('backToTop');
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTopBtn.classList.remove('opacity-0', 'invisible');
                backToTopBtn.classList.add('opacity-100', 'visible');
            } else {
                backToTopBtn.classList.add('opacity-0', 'invisible');
                backToTopBtn.classList.remove('opacity-100', 'visible');
            }
        });
        
        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
