<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 | 启明曙光官网</title>
    <link rel="icon" type="image/png" sizes="32x32" href="https://www.orientdawn.com/image/logo-icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://www.orientdawn.com/image/logo-icon.png">
    
    <script src="./js/tailwindcss.js"></script>
    <link rel="stylesheet" href="./js/fontawesome-free-6.5.2-web/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F4C81',
                        secondary: '#FF8A00',
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow-lg {
                text-shadow: 0 4px 12px rgba(0,0,0,0.25);
            }
            .bg-gradient-main {
                background: linear-gradient(102deg, #e40303 0%, #d1be20 100%);
            }
            .glass-card {
                background: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
        }
    </style>

    <style>
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        @keyframes float-up {
            0% { transform: translateY(100vh) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }
        }
        
        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 30px 10px rgba(255, 140, 0, 0.3), 0 0 60px 20px rgba(207, 32, 32, 0.2); }
            50% { box-shadow: 0 0 50px 20px rgba(255, 140, 0, 0.5), 0 0 80px 30px rgba(207, 32, 32, 0.3); }
        }
        
        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(140px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(140px) rotate(-360deg); }
        }
        
        @keyframes orbit-reverse {
            from { transform: rotate(360deg) translateX(160px) rotate(-360deg); }
            to { transform: rotate(0deg) translateX(160px) rotate(0deg); }
        }
        
        @keyframes orbit-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes scan-line {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes shooting-star {
            0% { opacity: 0; transform: rotate(-45deg) translateX(0); }
            10% { opacity: 1; }
            100% { opacity: 0; transform: rotate(-45deg) translateX(-300px); }
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle ease-in-out infinite;
            box-shadow: 0 0 6px 2px rgba(255, 215, 0, 0.5);
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float-up linear infinite;
            filter: blur(1px);
        }
        
        .glow-ring {
            animation: glow-pulse 3s ease-in-out infinite;
        }
        
        .orbit-dot {
            animation: orbit 8s linear infinite;
        }
        
        .orbit-dot-reverse {
            animation: orbit-reverse 10s linear infinite;
        }
        
        .rotate-ring {
            animation: orbit-ring 20s linear infinite;
        }
        
        .rotate-ring-fast {
            animation: orbit-ring 12s linear infinite reverse;
        }
        
        .scan-line {
            animation: scan-line 3s ease-in-out infinite;
        }
        
        .pulse-ring {
            animation: pulse-ring 2s ease-out infinite;
        }
        
        .fade-in-up {
            animation: fade-in-up 0.8s ease-out forwards;
        }
        
        .float-animation {
            animation: float 4s ease-in-out infinite;
        }
        
        .bg-gradient-animate {
            background-size: 200% 200%;
            animation: gradient-shift 8s ease infinite;
        }
        
        .grid-bg {
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
    </style>
</head>

<body class="font-sans bg-gradient-main text-white min-h-screen relative bg-gradient-animate">
    <div class="absolute inset-0 grid-bg opacity-50"></div>
    
    <div class="absolute inset-0 overflow-hidden">
        <div class="stars-container"></div>
        <div class="particles-container"></div>
    </div>
    
    <div class="absolute inset-0">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-yellow-300 rounded-full blur-3xl animate-pulse opacity-20"></div>
        <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-red-300 rounded-full blur-3xl animate-pulse opacity-20" style="animation-delay: 1s;"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-orange-300 rounded-full blur-3xl animate-pulse opacity-20" style="animation-delay: 0.5s;"></div>
        
        <div class="absolute top-1/3 right-1/3 w-64 h-64 bg-purple-400/10 rounded-full blur-3xl animate-pulse" style="animation-delay: 0.3s;"></div>
        <div class="absolute bottom-1/3 left-1/3 w-48 h-48 bg-blue-400/10 rounded-full blur-3xl animate-pulse" style="animation-delay: 0.7s;"></div>
    </div>

    <div class="container mx-auto px-4 md:px-6 relative z-10 min-h-screen flex flex-col lg:flex-row items-center justify-center gap-8 lg:gap-16 py-12 md:py-20">
        <div class="relative mx-auto flex-shrink-0">
            <div class="absolute inset-0 w-40 h-40 sm:w-48 sm:h-48 md:w-64 md:h-64 rounded-full bg-gradient-to-br from-yellow-300/30 to-red-300/30 blur-2xl"></div>
            
            <div class="relative w-36 h-36 sm:w-44 sm:h-44 md:w-56 md:h-56 rounded-full flex items-center justify-center glow-ring">
                <div class="absolute inset-0 rounded-full bg-gradient-to-br from-[#cf2020]/80 to-[#FF8A00]/80 backdrop-blur-sm"></div>
                
                <div class="absolute inset-0 rounded-full border border-white/10"></div>
                <div class="absolute inset-2 rounded-full border border-white/20"></div>
                <div class="absolute inset-4 rounded-full border border-white/10"></div>
                <div class="absolute inset-6 rounded-full border border-white/5"></div>
                
                <div class="absolute inset-0 overflow-hidden rounded-full">
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-1/2 bg-gradient-to-b from-white/25 to-transparent"></div>
                    <div class="absolute top-1/4 left-1/4 w-1/2 h-1/2 bg-white/5 rounded-full blur-lg"></div>
                </div>
                
                <div class="absolute inset-0 overflow-hidden rounded-full">
                    <div class="absolute left-0 top-0 w-full h-1 bg-gradient-to-r from-transparent via-white/30 to-transparent scan-line"></div>
                </div>
                
                <span class="text-5xl sm:text-6xl md:text-7xl font-extrabold text-white/95 relative z-10 drop-shadow-lg">404</span>
                
                <div class="absolute -inset-4 rounded-full border border-yellow-300/10 pulse-ring"></div>
                <div class="absolute -inset-6 rounded-full border border-orange-300/5 pulse-ring" style="animation-delay: 0.5s;"></div>
            </div>
            
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-72 h-72 md:w-96 md:h-96">
                <div class="absolute inset-0 border border-yellow-300/20 rounded-full rotate-ring"></div>
                <div class="absolute inset-4 border border-orange-300/15 rounded-full rotate-ring-fast"></div>
                
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-2 h-2 bg-yellow-300 rounded-full orbit-dot shadow-[0_0_10px_2px_rgba(255,215,0,0.8)]"></div>
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-orange-300 rounded-full orbit-dot" style="animation-delay: -2s; animation-duration: 6s;"></div>
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1 h-1 bg-white rounded-full orbit-dot" style="animation-delay: -4s; animation-duration: 10s;"></div>
                
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-3 h-3 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full orbit-dot-reverse shadow-[0_0_15px_3px_rgba(255,165,0,0.6)]" style="animation-delay: -1s;"></div>
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-red-300 rounded-full orbit-dot-reverse" style="animation-delay: -3s; animation-duration: 7s;"></div>
            </div>
            
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 md:w-[14rem] md:h-[14rem]">
                <div class="absolute inset-0 border border-white/5 rounded-full rotate-ring" style="animation-duration: 30s;"></div>
                
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-2 h-2 bg-white/60 rounded-full orbit-dot" style="animation-delay: -1.5s; animation-duration: 15s;"></div>
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1 h-1 bg-yellow-200/80 rounded-full orbit-dot-reverse" style="animation-delay: -5s; animation-duration: 18s;"></div>
            </div>
        </div>

        <div class="flex flex-col items-center lg:items-start text-center lg:text-left max-w-lg w-full">
            <h1 class="text-[clamp(1.8rem,4vw,3rem)] font-extrabold mb-3 md:mb-4 text-shadow-lg fade-in-up" style="animation-delay: 0.3s;">
                星河迷途
            </h1>
            
            <p class="text-lg md:text-xl mb-8 md:mb-10 opacity-90 fade-in-up" style="animation-delay: 0.5s;">
                您探索的页面坐标尚未被发现
            </p>

            <a href="index.html" class="inline-flex items-center gap-2 bg-transparent border-2 border-white px-10 py-4 rounded-full font-semibold hover:bg-white/10 hover:shadow-xl transition-all duration-300 text-lg mb-10 md:mb-12 float-animation fade-in-up" style="animation-delay: 0.7s;">
                <i class="fa-solid fa-home"></i>返回首页
            </a>

            <div class="glass-card rounded-2xl p-6 md:p-8 w-full hover:bg-white/20 hover:shadow-[0_0_40px_rgba(255,255,255,0.1)] transition-all duration-500 fade-in-up" style="animation-delay: 0.9s;">
                <div class="flex items-center justify-center lg:justify-start gap-3 mb-4">
                    <i class="fa-solid fa-circle-question text-yellow-300"></i>
                    <h3 class="text-lg font-semibold">需要帮助？</h3>
                </div>
                <p class="text-white/80 text-sm text-center lg:text-left mb-4">
                    如果您认为这是一个错误，或者需要其他帮助，请联系我们的管理员
                </p>
                <a href="mailto:contact@orientdawn.com" class="flex items-center justify-center lg:justify-start gap-2 bg-white/20 hover:bg-white/30 hover:shadow-[0_0_20px_rgba(255,255,255,0.2)] px-6 py-3 rounded-full font-medium transition-all duration-300 group">
                    <i class="fa-solid fa-envelope group-hover:rotate-12 transition-transform duration-300"></i>
                    <span>contact@orientdawn.com</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            function createStars() {
                const starsContainer = document.querySelector('.stars-container');
                const starCount = 60;
                
                for (let i = 0; i < starCount; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    
                    const size = Math.random() * 3 + 2;
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    
                    star.style.animationDelay = Math.random() * 3 + 's';
                    star.style.animationDuration = Math.random() * 2 + 1 + 's';
                    
                    const colors = ['#FFD700', '#FFA500', '#FFE4B5', '#FFFF00'];
                    star.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    starsContainer.appendChild(star);
                }
            }
            
            function createParticles() {
                const particlesContainer = document.querySelector('.particles-container');
                const particleCount = 35;
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    
                    particle.style.left = Math.random() * 100 + '%';
                    
                    const size = Math.random() * 5 + 2;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    
                    particle.style.animationDuration = Math.random() * 7 + 8 + 's';
                    particle.style.animationDelay = Math.random() * 15 + 's';
                    
                    const colors = [
                        'rgba(255, 140, 0, 0.8)',
                        'rgba(255, 69, 0, 0.7)',
                        'rgba(255, 215, 0, 0.9)',
                        'rgba(255, 182, 193, 0.7)',
                        'rgba(135, 206, 250, 0.7)'
                    ];
                    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    if (Math.random() > 0.7) {
                        particle.style.boxShadow = `0 0 ${size * 2}px ${size}px ${particle.style.backgroundColor}`;
                    }
                    
                    particlesContainer.appendChild(particle);
                }
            }
            
            function createShootingStars() {
                const starsContainer = document.querySelector('.stars-container');
                const count = 5;
                
                for (let i = 0; i < count; i++) {
                    const shootingStar = document.createElement('div');
                    shootingStar.style.position = 'absolute';
                    shootingStar.style.width = '100px';
                    shootingStar.style.height = '1px';
                    shootingStar.style.background = 'linear-gradient(to right, rgba(255,255,255,0.8), transparent)';
                    shootingStar.style.top = Math.random() * 50 + '%';
                    shootingStar.style.left = Math.random() * 100 + '%';
                    shootingStar.style.transform = 'rotate(-45deg)';
                    shootingStar.style.opacity = '0';
                    shootingStar.style.animation = `shooting-star ${3 + Math.random() * 4}s ease-in-out infinite`;
                    shootingStar.style.animationDelay = Math.random() * 10 + 's';
                    
                    starsContainer.appendChild(shootingStar);
                }
            }
            
            createStars();
            createParticles();
            createShootingStars();
        });
    </script>
</body>
</html>
